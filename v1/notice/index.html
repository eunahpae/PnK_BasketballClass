<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 — 전문농구교실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages/notice.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="../">홈</a><span>›</span><span>공지사항</span></div>
        <h1>공지사항</h1>
        <p>휴강, 일정 변경, 행사 소식을 안내합니다</p>
      </div>
    </section>
    <div class="container">
      <div class="tab-wrap" id="noticeTabs">
        <button class="tab-item active" data-cat="all">전체</button>
        <button class="tab-item" data-cat="holiday">휴강 안내</button>
        <button class="tab-item" data-cat="event">행사</button>
        <button class="tab-item" data-cat="change">일정 변경</button>
      </div>
      <div class="notice-board" id="noticeBoard"></div>
    </div>

    <!-- 공지 상세 모달 -->
    <div class="modal-overlay" id="noticeModal">
      <div class="modal" style="max-width:680px">
        <div class="modal-header">
          <h3 class="modal-title" id="noticeModalTitle"></h3>
          <button class="modal-close" onclick="Utils.closeModal('noticeModal')">✕</button>
        </div>
        <div class="notice-detail-meta" id="noticeDetailMeta"></div>
        <div class="notice-detail-body" id="noticeDetailBody"></div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/pages/notice.js"></script>
</body>
</html>
